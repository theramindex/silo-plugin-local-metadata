name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, without leading v. Defaults to the selected ref."
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Resolve version
        id: version
        shell: bash
        run: |
          version="${{ inputs.version }}"
          if [ -z "$version" ]; then
            version="${GITHUB_REF_NAME#v}"
          fi
          test -n "$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Test
        run: make test

      - name: Build release binaries
        run: |
          make checksums BINARY=plugin VERSION="${{ steps.version.outputs.version }}"
          make catalog-assets BINARY=plugin PLUGIN_SLUG=silo-plugin-local-metadata VERSION="${{ steps.version.outputs.version }}"

      - name: Publish source release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" --title "$TAG" --notes "Silo Local Metadata $TAG"
          gh release upload "$TAG" dist/plugin-* dist/checksums.txt --clobber

      - name: Publish catalog release assets
        env:
          GH_TOKEN: ${{ secrets.CATALOG_PUSH_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "CATALOG_PUSH_TOKEN is not set; skipping theramindex/silo-plugins release upload."
            exit 0
          fi
          gh release view "$TAG" --repo theramindex/silo-plugins >/dev/null 2>&1 || \
            gh release create "$TAG" --repo theramindex/silo-plugins --title "$TAG" --notes "The RamIndex Silo plugins $TAG"
          gh release upload "$TAG" dist/catalog/plugin-* dist/catalog/checksums.txt \
            --repo theramindex/silo-plugins \
            --clobber

      - uses: actions/upload-artifact@v6
        with:
          name: silo-local-metadata-dist
          path: dist/
